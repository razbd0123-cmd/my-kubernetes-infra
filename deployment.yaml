apiVersion: apps/v1
kind: Deployment
metadata:
  name: hachmash-app
  labels:
    app: my-web-app
spec:
  replicas: 3 # כאן אנחנו מגדירים כמה עותקים (Pods) ירוצו
  selector:
    matchLabels:
      app: my-web-app
  template:
    metadata:
      labels:
        app: my-web-app
    spec:
      containers:
      - name: nginx-server
        image: nginx:1.25 # זו התמונה של השרת שנמשוך
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: hachmash-service
spec:
  selector:
    app: my-web-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
